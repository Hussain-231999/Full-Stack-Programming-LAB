<!DOCTYPE html>
<html>
<head>
    <title>Tabbed Content with Smooth Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tabs">
        <button class="tab_btn" data_target="section1">Tab 1</button>
        <button class="tab_btn" data_target="section2">Tab 2</button>
        <button class="tab_btn" data_target="section3">Tab 3</button>
        <button class="tab_btn" data_target="section4">Tab 4</button>
    </div>

    <div id="section1" class="content_section">
        <h2>Section 1</h2>
        <p>This is content for Tab 1.</p>
    </div>

    <div id="section2" class="content_section">
        <h2>Section 2</h2>
        <p>This is content for Tab 2.</p>
    </div>

    <div id="section3" class="content_section">
        <h2>Section 3</h2>
        <p>This is content for Tab 3.</p>
    </div>

    <div id="section4" class="content_section">
        <h2>Section 4</h2>
        <p>This is content for Tab 4.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
