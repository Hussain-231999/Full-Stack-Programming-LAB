<!DOCTYPE html>
<html>
<head>
    <title>Simple Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery">
        <img id="gallery_image" src="" alt="Gallery Image">
        <p id="caption"></p>

        <div class="buttons">
            <button id="prev_btn">Previous</button>
            <button id="next_btn">Next</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
