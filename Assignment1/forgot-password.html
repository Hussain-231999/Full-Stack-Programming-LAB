<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – HotSpring Portable Spas</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="assets/css/style.css"/>
</head>
<body>
<div id="site-header"></div>
<div class="page-hero">
  <div class="container">
    <nav class="breadcrumb"><a href="index.html">Home</a><span>›</span><a href="my-account.html">My Account</a></nav>
    <div class="section-heading" style="color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.5);">Forget Your Password</div>
    <div class="content-box" style="max-width:560px;">
      <div class="sub-heading">User Account Details</div>
      <p class="field-note">Please enter your email address below to retrieve your password.</p>
      <p class="field-note">*Required Fields</p>
      <div id="successMsg" class="success-banner" style="display:none;"><i class="fa-solid fa-circle-check" style="color:#16a34a;margin-right:6px;"></i>A password reset link has been sent to your email.</div>
      <form id="forgotForm" novalidate>
        <div class="form-row"><label>Email <span class="req">*</span></label><div class="field"><input type="email" id="forgotEmail" class="form-control" autocomplete="email"/><div class="error-msg" id="forgotEmailErr">Please enter a valid email address.</div></div></div>
        <div style="margin:10px 0 18px 160px;display:flex;align-items:center;gap:8px;">
          <input type="checkbox" id="rememberForgot" style="width:14px;height:14px;accent-color:#cc0000;"/>
          <label for="rememberForgot" style="font-size:.8rem;color:#555;cursor:pointer;">Remember me next time I visit</label>
        </div>
        <div style="margin-left:160px;"><button type="submit" class="btn btn-red">SUBMIT</button></div>
      </form>
    </div>
  </div>
</div>
<div id="site-brand"></div>
<div id="site-footer"></div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="assets/js/layout.js"></script>
<script src="assets/js/main.js"></script>
<script>
$(function(){
  $('#site-header').html(HS.layout.header());
  $('#site-brand').html(HS.layout.brandStrip());
  $('#site-footer').html(HS.layout.footer());
  HS.layout.init();
  $('#forgotEmail').on('input',function(){ $(this).removeClass('error'); $('#forgotEmailErr').hide(); });
  $('#forgotForm').on('submit',function(e){
    e.preventDefault();
    if(!HS.validate.email($('#forgotEmail').val())){ HS.showError('forgotEmail','forgotEmailErr'); return; }
    HS.clearError('forgotEmail','forgotEmailErr');
    $('#successMsg').show(); this.reset();
  });
});
</script>
</body>
</html>
